# 강조 배정 설정 — '판단형' 모델.
# 강조는 '가게명·가격' 같은 종류로 나누지 않는다. LLM이 문단마다 강조할 핵심을
# 직접 판단해 <<강조:어구>>로 감싸고, 단점·주의는 <<주의:어구>>(빨강)로 감싼다.
#
# 아래 preset_tags는 '어느 색을 어느 갈래에 쓸지'만 정한다(색 번호 = 파워 단축키/내장 프리셋 번호).
# 같은 갈래에 여러 색을 주면 그 색들이 자동 순환(단조로움 방지) — LLM은 색을 직접 고르지 않는다.
# 서식 탭에서 색마다 강조/주의/안씀을 고를 수 있다(빈 칸이면 그 색은 안 씀).

# 프리셋(강조색)별 태그 (서식 탭에서 편집) — 색마다 용도. 같은 태그를 여러 색에 주면 자동 순환. LLM은 <<태그:어구>>로 고름
preset_tags:
  1: 강조
  2: 부정
  3: 강조
  4: 강조
  5: 강조
  16: 주의
