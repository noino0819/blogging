# 강조 배정 설정 (기획서 §6.1) — 자유롭게 수정하세요.
# 단축키 번호는 파워 단축키(config로 import) 또는 내장 기본 스타일의 번호입니다.

# 순환 풀: 핵심 문장·감상에 번갈아 적용 (1→3→5→1 식 돌려쓰기, 단조로움 방지)
cycling_pool: [7, 8, 13, 18]

# 고정 매핑: 특정 의미엔 항상 같은 단축키 (일관성)
fixed_map:
  price: 20   # 가격 → 주황 계열
  name: 3     # 가게명/상품명 → 핑크 강조

# (옵션) 강조 밀도 규칙
max_per_paragraph: 2     # 한 문단 강조 최대 개수
min_sentence_gap: 1      # 강조 간 최소 문장 간격
