# 시드 기반 스타일 변주 풀 (variation.py가 글마다 부분집합을 뽑아 프롬프트에 주입)
#
# 왜: 전 글이 같은 카오모지 세트·같은 빈도·같은 고정 문구로 수렴하면 블로그 전체
# (나아가 여러 계정)에서 동일 패턴이 반복돼, 네이버 유사문서·스팸 필터가 보는
# '타 문서와 중복된 표현 반복' 신호(기계 지문)가 된다. 여기 풀을 넓게 두고
# 글(시드)마다 5~8개 부분집합·개수 상한을 다르게 배정해 글 간 분산을 만든다.
#
# 주의: 카오모지에 '~'(물결)나 '!'(느낌표)가 든 것은 넣지 말 것 — postprocess의
# 문자 치환이 카오모지를 깨뜨린다. ((๑´~ˋ๑)만 예외적으로 코드에서 보호됨)

kaomoji:
  # 맛·만족·좋은 느낌
  taste:
    - "(๑ᵔ⤙ᵔ๑)"
    - "(๑´~ˋ๑)"
    - "( ˶ˆᗜˆ˵ )"
    - "(˶ᵔ ᵕ ᵔ˶)"
    - "(⸝⸝>ᴗ<⸝⸝)"
    - "(๑˃̵ᴗ˂̵)"
    - "( ᐛ )"
    - "(´ᗜ`)"
  # 파이팅·응원
  cheer:
    - "٩(ˊᗜˋ*)و"
    - "(ง •̀_•́)ง"
    - "(๑و•̀Δ•́)و"
    - "٩( ᐛ )و"
    - "ᕙ( •̀ᗜ•́ )ᕗ"
    - "(๑•̀ㅂ•́)و"
  # 아쉬움·슬픔
  sad:
    - "(｡•́︿•̀｡)"
    - "( ᵕ̩̩ㅅᵕ̩̩ )"
    - "(｡ŏ﹏ŏ)"
    - "(ᐡ •̥ ﻌ •̥ ᐡ)"
    - "( ˃̣̣̥⌓˂̣̣̥ )"
  # 분노·불만
  angry:
    - "٩(๑ˋ^´๑)۶"
    - "(•ˋ _ ˊ•)"
    - "(¬_¬)"
  # 꾸미기·귀여움
  cute:
    - "(｡･ω･｡)o"
    - "ღ'ᴗ'ღ"
    - "(⑅˘꒳˘)"
    - "( ˶ˊᵕˋ˵ )"
    - "₍ᐢ..ᐢ₎"
    - "(=^･ω･^=)"
    - "◝(ᵔᗜᵔ)◜"

# 허용 유행어 풀 — 수명이 긴 표현 위주(갱신일: 2026-07). 글마다 2~4개만 노출된다.
# 형식: 표현 — 뜻 — 예시. 각 항목에 weight: 0~3(안 씀/가끔/보통/자주)을 붙이면
# 후보로 뽑힐 확률 가중치가 된다(미지정 = 1). 웹UI '스타일 풀'에서도 편집 가능.
slang:
  - expr: "찐"
    meaning: "진짜의 강조"
    example: "찐 현지인 맛집"
  - expr: "인생OO"
    meaning: "지금까지 중 최고의 OO"
    example: "인생 라멘 등극"
  - expr: "미쳤다"
    meaning: "감탄의 의미로 긍정적 사용"
    example: "뷰 진-짜 미쳤다"
  - expr: "존맛"
    meaning: "정말 맛있다"
    example: "한입 먹자마자 존맛 인정"
  - expr: "최애"
    meaning: "가장 좋아하는 것"
    example: "요즘 최애 카페"
  - expr: "N차"
    meaning: "여러 번 반복(방문·구매)"
    example: "벌써 3차 방문"
  - expr: "OO각"
    meaning: "OO할 분위기·확신"
    example: "이건 재방문각"
  - expr: "꿀조합"
    meaning: "잘 어울리는 조합"
    example: "치즈랑 같이 먹으면 꿀조합"
  - expr: "도장깨기"
    meaning: "목록을 하나씩 정복하기"
    example: "연남동 맛집 도장깨기 중"
  - expr: "가심비"
    meaning: "가격 대비 마음의 만족"
    example: "가심비로는 최고"
  - expr: "입틀막"
    meaning: "말문이 막힐 정도로 놀람"
    example: "비주얼 보고 입틀막"
  - expr: "플렉스"
    meaning: "기분 좋게 큰 소비를 함"
    example: "오늘은 플렉스 해봤어요"

# 맛집 글 섹션 흐름 변형(시드로 1개 선택). 재료에 없는 섹션은 건너뛴다는 규칙은 그대로.
structure_place:
  - "위치·실용 정보 → 외관·분위기 → 메뉴 후기 → 총평 (기본 흐름)"
  - "메뉴·맛 이야기 먼저 → 공간·분위기 → 위치·웨이팅 같은 실용 정보 → 총평"
  - "방문 계기와 첫인상 → 메뉴 후기 → 위치·실용 정보와 팁 → 총평"

# 상품 글 섹션 흐름 변형
structure_product:
  - "첫인상·소재 → 차별점 → 활용성·사용감 → (구성품) → 총평 (기본 흐름)"
  - "실사용 장면 먼저 → 첫인상·디자인 → 차별점 → 총평"
  - "구매 고민 포인트 → 사용해 보니 → 디테일·구성 → 총평"

# 핵심 한마디(인용구) 위치
quote_position:
  - "인트로 직후"
  - "마무리 총평 직전"

# 상품 추천 체크리스트 소제목 변형(🌟 뒤에 붙는 문구)
checklist_heading:
  - "이런 분들께 추천해요"
  - "이런 분이라면 만족하실 거예요"
  - "저는 이런 분께 권하고 싶어요"
  - "이런 분들이 쓰면 딱이에요"

# 상품 핵심 요약 박스에서 소제목-설명 연결 문자
summary_connector:
  - "—"
  - "·"

# PICK 리스트(여러 곳 소개 글) 전환 멘트 변형 — 그대로 베끼지 말고 상황에 맞게 응용
pick_transition:
  - "아래에서 자세하게 보여드릴게요 .ᐟ"
  - "하나씩 차례로 풀어볼게요 .ᐟ"
  - "그럼 첫 번째 가게부터 가볼게요 〰️"
